<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm p-4">
        <h2 class="text-center mb-4">로그인</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-3">로그인</button>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'reservations:signup' %}" class="text-decoration-none">아직 계정이 없으신가요? 회원가입</a>
        </div>
    </div>
</div>
</body>
</html>
