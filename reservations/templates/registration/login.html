<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm p-4 border-0">
        <h2 class="text-center mb-4 fw-bold" style="color: #ed542b;">로그인</h2>
        
        <!-- 에러 메시지 공간 -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 text-center" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="username" class="form-label fw-bold">아이디</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label fw-bold">비밀번호</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100 py-2 fw-bold" style="background-color: #ed542b; border-color: #ed542b;">로그인</button>
        </form>
        
        <!-- ✨ 수정된 하단 링크 부분 (비밀번호 찾기 추가) -->
        <div class="text-center mt-4 pt-3 border-top d-flex justify-content-center align-items-center gap-3">
            <a href="{% url 'reservations:find_password' %}" class="text-decoration-none fw-bold" style="color: #6c757d; font-size: 0.9rem;">비밀번호 찾기</a>
            <span class="text-muted" style="font-size: 0.8rem;">|</span>
            <a href="{% url 'reservations:signup' %}" class="text-decoration-none fw-bold" style="color: #ed542b; font-size: 0.9rem;">회원가입하기</a>
        </div>

    </div>
</div>
</body>
</html>
