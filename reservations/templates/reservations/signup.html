<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5" style="max-width: 500px;">
    <div class="card shadow-sm p-4 border-0">
        <h2 class="text-center mb-4 fw-bold" style="color: #ed542b;">회원가입</h2>
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="username" class="form-label fw-bold">아이디</label>
                <input type="text" class="form-control" id="username" name="username" required placeholder="영문, 숫자 포함 4자 이상" autofocus>
            </div>
            
            <!-- ✨ 이름(실명) 추가 -->
            <div class="mb-3">
                <label for="real_name" class="form-label fw-bold">이름 (실명)</label>
                <input type="text" class="form-control" id="real_name" name="real_name" required placeholder="예: 홍길동">
            </div>

            <!-- ✨ 내부/외부 이용자 구분 라디오 버튼 추가 -->
            <div class="mb-3 p-3 bg-light border rounded">
                <label class="form-label fw-bold d-block text-dark">이용자 소속 구분</label>
                <div class="form-check form-check-inline mt-1">
                    <input class="form-check-input" type="radio" name="user_type" id="type_internal" value="INTERNAL" required>
                    <label class="form-check-label fw-bold text-primary" for="type_internal">동국대학교 (내부)</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="user_type" id="type_external" value="EXTERNAL">
                    <label class="form-check-label fw-bold text-secondary" for="type_external">타 기관/기업 (외부)</label>
                </div>
                <div class="form-text small mt-2 text-muted">※ 내부 이용자는 별도 가입 승인 없이 즉시 시스템 이용이 가능합니다.</div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">비밀번호</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="영문, 숫자, 특수문자 조합 8자 이상">
            </div>
            
            <div class="mb-3">
                <label for="password_confirm" class="form-label fw-bold">비밀번호 확인</label>
                <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
            </div>

            <div class="mb-3">
                <label for="affiliation" class="form-label fw-bold" style="color: #6c757d;">상세 소속 (학교/연구실명 등)</label>
                <input type="text" class="form-control" id="affiliation" name="affiliation" required placeholder="예: 권순철 교수님 연구실">
            </div>

            <div class="mb-4">
                <label for="advisor_id" class="form-label fw-bold" style="color: #6c757d;">지도교수 교직원 번호 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="advisor_id" name="advisor_id" required placeholder="비밀번호 찾기 시 필요합니다" style="border: 2px solid #fbb812;">
                <div class="form-text small text-muted">※ 외부 이용자의 경우 관리자 문의 후 부여받은 코드를 입력해주세요.</div>
            </div>
            
            <button type="submit" class="btn btn-success w-100 py-2 fw-bold" style="background-color: #ed542b; border-color: #ed542b;">가입하기</button>
        </form>
        <div class="text-center mt-4 pt-3 border-top">
            <span class="text-muted small">이미 계정이 있으신가요?</span>
            <a href="{% url 'reservations:login' %}" class="text-decoration-none fw-bold ms-2" style="color: #948a88;">로그인하기</a>
        </div>
    </div>
</div>
</body>
</html>
