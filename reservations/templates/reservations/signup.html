<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm p-4">
        <h2 class="text-center mb-4">회원가입</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mb-3 mt-3">
                <label for="affiliation" class="form-label" style="color: #948a88; font-weight: 600;">소속 (학교/지도교수)</label>
                <input type="text" class="form-control" id="affiliation" name="affiliation" required placeholder="예: 동국대학교 권순철 교수님 연구실" style="border: 2px solid #fbb812;">
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">가입하기</button>
        </form>
    </div>
</div>
</body>
</html>
