{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소속별 비용 정산</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; padding-top: 50px; }
        .table-hover tbody tr:hover { background-color: #fcf8f2; }
    </style>
</head>
<body>
<div class="container" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: #ed542b;">📊 소속별 장비 이용 금액 정산</h2>
        <a href="{% url 'reservations:reservation_page' %}" class="btn btn-outline-secondary">달력으로 돌아가기</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 text-center align-middle">
                <thead class="table-dark" style="background-color: #948a88;">
                    <tr>
                        <th class="py-3">소속 (연구실/기관)</th>
                        <th class="py-3">총 이용 건수</th>
                        <th class="py-3">총 이용 시간</th>
                        <th class="py-3" style="color: #fbb812;">총 청구 금액</th>
                    </tr>
                </thead>
                <tbody>
                    {% for aff, data in settlement_data.items %}
                    <tr>
                        <td class="fw-bold py-3 text-start ps-4">{{ aff }}</td>
                        <td class="py-3">{{ data.reservation_count }} 건</td>
                        <td class="py-3">{{ data.total_hours|floatformat:1 }} 시간</td>
                        <td class="py-3 fw-bold fs-5" style="color: #ed542b;">₩ {{ data.total_cost }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="py-5 text-muted">아직 등록된 장비 이용 내역이 없습니다.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
