<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm p-4 border-0">
        <h3 class="text-center mb-4 fw-bold" style="color: #343a40;">🔒 비밀번호 변경</h3>
        
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <div class="form-text small">{{ field.help_text }}</div>
                    {% endif %}
                    {% for error in field.errors %}
                        <div class="text-danger small mt-1">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}
            
            <div class="d-flex gap-2 mt-4">
                <a href="{% url 'reservations:mypage' %}" class="btn btn-light w-50 fw-bold border">취소</a>
                <button type="submit" class="btn btn-dark w-50 fw-bold">변경하기</button>
            </div>
        </form>
    </div>
</div>
<!-- 장고 기본 폼에 부트스트랩 클래스 입히기 (스크립트) -->
<script>
    document.querySelectorAll('input').forEach(function(input) {
        input.classList.add('form-control');
    });
</script>
</body>
</html>
